name: Build Docs

on:
  push:
    branches: [main]

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install sphinx sphinx-rtd-theme myst-parser sphinx-autodoc-typehints

      - name: Build docs
        run: |
          cd docs
          make html
